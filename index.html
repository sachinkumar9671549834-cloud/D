<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Army Agniveer Exam Portal</title>
    <style>
        /* CSS वैरियेबल्स और बेसिक रीसेट */
        :root {
            --bg-color: #0b132b;
            --card-bg: #1c2541;
            --gold: #e5a93b;
            --text-muted: #8da2bb;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* मुख्य ऐप कंटेनर जो मोबाइल स्क्रीन पर एकदम फिट बैठेगा */
        #app {
            max-width: 500px;
            margin: 0 auto;
            padding: 15px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        /* कुछ बेसिक ग्लोबल स्टाइल्स जो रिस्पॉन्सिव रखने में मदद करेंगे */
        input, button {
            font-family: inherit;
        }

        /* स्क्रॉलबार को थोड़ा बेहतर दिखाने के लिए */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0b132b;
        }
        ::-webkit-scrollbar-thumb {
            background: #233565;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <!-- इसी मुख्य कंटेनर (App Div) के अंदर जावास्क्रिप्ट अपना पूरा कमाल दिखाएगी -->
    <div id="app">
        <div style="text-align: center; margin-top: 50px; color: var(--text-muted); font-size: 16px;">
            पोर्टल लोड हो रहा है, कृपया प्रतीक्षा करें...
        </div>
    </div>

    <!-- आपकी जावास्क्रिप्ट फाइल का लिंक -->
    <script src="script.js"></script>
</body>
</html>
